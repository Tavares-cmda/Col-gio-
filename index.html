<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escola Paraná</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TELA INICIAL NOVA -->
<div class="container" id="inicio">
  <h2>Bem-vindo</h2>

  <button onclick="irLogin()">Login</button>
  <button onclick="irRegistro()">Registrar</button>
</div>

<!-- REGISTRO -->
<div class="container hidden" id="registro">
  <h2>Registro</h2>

  <input id="emailReg" type="text" placeholder="Email @escola.pr.gov.br">
  <input id="senhaReg" type="password" placeholder="Senha">
  <input id="confSenha" type="password" placeholder="Confirmar senha">

  <button onclick="registrar()">Registrar</button>
  <button class="voltar" onclick="voltarInicio()">Voltar</button>
</div>

<!-- LOGIN -->
<div class="container hidden" id="loginEmail">
  <h2>Login</h2>

  <input id="emailLogin" type="text" placeholder="Email">
  <input id="senhaLogin" type="password" placeholder="Senha">

  <button onclick="login()">Entrar</button>
  <button class="voltar" onclick="voltarInicio()">Voltar</button>
</div>

<!-- SUA TELA ANTIGA -->
<div class="container hidden" id="home">

  <div class="topo-escola">
    <h1>São Cristóvão - EFMP</h1>
    <p>Educar é o nosso compromisso; inspirar é a nossa paixão.</p>
  </div>

  <div class="logo">e.</div>
  <h1 class="titulo-app">escola<br><span>PARANÁ</span></h1>

  <div class="card" onclick="abrirLogin('Aluno')">
    <div class="icon">👨‍🎓</div>
    <p>sou aluno(a)</p>
  </div>

  <div class="card" onclick="abrirLogin('Responsável')">
    <div class="icon">👨‍👩‍👧</div>
    <p>sou responsável</p>
  </div>
</div>

<!-- LOGIN CPF -->
<div class="container hidden" id="login">
  <h2 id="tituloLogin">Login</h2>

  <input id="cpf" type="text" placeholder="CGM ou CPF" oninput="validarCampos()">
  <input id="celular" type="text" placeholder="Celular" oninput="validarCampos()">

  <button onclick="enviarCodigo()">Enviar código</button>

  <button id="btnEntrar" class="btn-entrar" onclick="entrar()" disabled>Entrar</button>

  <button class="voltar" onclick="voltarHome()">Voltar</button>
</div>

<!-- MENU -->
<div class="container hidden" id="menu">
  <h2>Menu</h2>
  <div class="grid">
    <div class="item">🏠<span>Início</span></div>
    <div class="item">📊<span>Grade</span></div>
    <div class="item">📝<span>Notas</span></div>
  </div>
  <button onclick="sair()">Sair</button>
</div>

<script src="script.js"></script>
</body>
</html>
