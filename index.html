<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escola Paraná</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        
        :root {
            --primary: #003087;
            --secondary: #C8102E;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #003087, #0055cc);
            color: white;
            min-height: 100vh;
        }
        
        #splash {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #003087, #0055cc);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 1s ease;
        }
        #splash-logo {
            width: 240px;
            height: 240px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            font-size: 100px;
            color: #003087;
        }
        #splash-text { font-size: 28px; font-weight: 700; }

        .screen { display: none; min-height: 100vh; padding: 20px; }
        .screen.active { display: block; }

        .form-container {
            max-width: 420px;
            margin: 80px auto 0;
            background: white;
            color: #333;
            padding: 35px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
            text-align: center;
        }

        h2 { color: var(--primary); margin-bottom: 25px; }
        
        .input-group {
            position: relative;
            margin: 12px 0;
        }
        
        input {
            width: 100%;
            padding: 15px 15px 15px 15px;           /* sem padding extra à direita */
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }
        
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;               /* área reservada como no quadrado */
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f9fa;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 22px;
            cursor: pointer;
            color: #555;
            z-index: 25;
        }
        
        .toggle-password:hover {
            background: #e9ecef;
            color: var(--primary);
        }

        button {
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #666; color: white; }
        .btn-back {
            background: #C8102E;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- SPLASH -->
    <div id="splash">
        <div id="splash-logo">🏫</div>
        <div id="splash-text">Escola Paraná</div>
    </div>

    <!-- TELA INICIAL -->
    <div id="initial-screen" class="screen active">
        <div class="form-container">
            <h2>Bem-vindo ao App Escola Paraná</h2>
            <p style="margin: 25px 0 35px; color:#555;">Escolha uma opção para continuar</p>
            
            <button onclick="mostrarLogin()" class="btn-primary">Fazer Login</button>
            <button onclick="mostrarRegistro()" class="btn-secondary">Criar Nova Conta</button>
            
            <p style="margin-top: 40px; font-size: 14px; color:#666;">Use apenas @escola.pr.gov.br</p>
        </div>
    </div>

    <!-- REGISTRO -->
    <div id="register-screen" class="screen">
        <div class="form-container">
            <h2>Criar Conta</h2>
            <input type="email" id="reg-email" placeholder="seuemail@escola.pr.gov.br">
            
            <div class="input-group">
                <input type="password" id="reg-senha" placeholder="Crie uma senha" autocomplete="new-password">
                <button type="button" class="toggle-password" onclick="togglePassword('reg-senha')">👁</button>
            </div>
            
            <div class="input-group">
                <input type="password" id="reg-conf-senha" placeholder="Confirme a senha" autocomplete="new-password">
                <button type="button" class="toggle-password" onclick="togglePassword('reg-conf-senha')">👁</button>
            </div>
            
            <button onclick="registrarUsuario()" class="btn-primary">Registrar</button>
            <p onclick="voltarInicial()" class="link" style="margin-top:15px; color:var(--primary);">Voltar</p>
        </div>
    </div>

    <!-- LOGIN -->
    <div id="login-screen" class="screen">
        <div class="form-container">
            <h2>Fazer Login</h2>
            <input type="email" id="login-email" placeholder="seuemail@escola.pr.gov.br">
            
            <div class="input-group">
                <input type="password" id="login-senha" placeholder="Senha" autocomplete="current-password">
                <button type="button" class="toggle-password" onclick="togglePassword('login-senha')">👁</button>
            </div>
            
            <button onclick="fazerLogin()" class="btn-primary">Entrar</button>
            <p onclick="voltarInicial()" class="link" style="margin-top:15px; color:var(--primary);">Voltar</p>
        </div>
    </div>

    <!-- ESCOLHA ALUNO / RESPONSÁVEL -->
    <div id="role-screen" class="screen">
        <div class="form-container" style="margin-top: 100px;">
            <h2>Quem está acessando?</h2>
            
            <button onclick="escolherRole('aluno')" class="btn-primary" style="padding:18px; font-size:18px; margin:15px 0;">
                👨‍🎓 Sou Aluno
            </button>
            <button onclick="escolherRole('responsavel')" class="btn-secondary" style="padding:18px; font-size:18px; margin:15px 0;">
                👨‍👩‍👧 Sou Responsável
            </button>
            
            <button onclick="voltarInicial()" class="btn-back">← Voltar</button>
        </div>
    </div>

    <!-- DASHBOARD ALUNO -->
    <div id="aluno-dashboard" class="screen">
        <div style="background:#003087; padding:15px; text-align:center; border-radius:0 0 15px 15px; margin-bottom:20px;">
            <div style="display:flex; justify-content:space-between; align-items:center; color:white;">
                <button onclick="voltarParaRole()" style="background:none;border:none;color:white;font-size:26px;cursor:pointer;">←</button>
                <span id="aluno-email-header" style="font-size:15px;opacity:0.9;"></span>
            </div>
        </div>

        <div style="padding:15px;">
            <div style="background:white;color:#333;border-radius:12px;padding:20px;margin-bottom:20px;">
                <strong>Boletim - 2º Trimestre</strong>
                <table style="width:100%;margin-top:15px;">
                    <tr><td>Matemática</td><td style="text-align:right;font-weight:bold;">8,5</td></tr>
                    <tr><td>Português</td><td style="text-align:right;font-weight:bold;">9,2</td></tr>
                    <tr><td>História</td><td style="text-align:right;font-weight:bold;">7,8</td></tr>
                </table>
            </div>

            <div style="background:white;color:#333;border-radius:12px;padding:20px;">
                <strong>Frequência: <span style="color:#28a745;">96%</span></strong>
            </div>
        </div>
    </div>

    <script>
        let usuarioLogado = null;

        function mostrarTela(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        window.onload = function() {
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                    mostrarTela('initial-screen');
                }, 1000);
            }, 5000);
        };

        function voltarInicial() {
            mostrarTela('initial-screen');
        }

        function mostrarRegistro() {
            const ultimoEmail = localStorage.getItem('ultimoEmailEscola');
            if (ultimoEmail) document.getElementById('reg-email').value = ultimoEmail;
            document.getElementById('reg-senha').value = '';
            document.getElementById('reg-conf-senha').value = '';
            mostrarTela('register-screen');
        }

        function mostrarLogin() {
            const ultimoEmail = localStorage.getItem('ultimoEmailEscola');
            if (ultimoEmail) document.getElementById('login-email').value = ultimoEmail;
            document.getElementById('login-senha').value = '';
            mostrarTela('login-screen');
        }

        function togglePassword(id) {
            const input = document.getElementById(id);
            input.type = (input.type === 'password') ? 'text' : 'password';
        }

        function registrarUsuario() {
            const email = document.getElementById('reg-email').value.trim();
            const senha = document.getElementById('reg-senha').value;
            const conf = document.getElementById('reg-conf-senha').value;

            if (!email.endsWith('@escola.pr.gov.br')) return alert('O e-mail deve terminar com @escola.pr.gov.br');
            if (senha.length < 6) return alert('A senha deve ter no mínimo 6 caracteres');
            if (senha !== conf) return alert('As senhas não coincidem');

            let usuarios = JSON.parse(localStorage.getItem('usuariosEscola')) || {};
            usuarios[email] = { email: email, senha: senha, nome: email.split('@')[0] };
            localStorage.setItem('usuariosEscola', JSON.stringify(usuarios));
            localStorage.setItem('ultimoEmailEscola', email);

            alert('✅ Conta criada com sucesso!\nAgora faça login.');
            document.getElementById('login-email').value = email;
            mostrarTela('login-screen');
        }

        function fazerLogin() {
            const email = document.getElementById('login-email').value.trim();
            const senha = document.getElementById('login-senha').value;

            if (!email.endsWith('@escola.pr.gov.br')) return alert('Use um e-mail @escola.pr.gov.br');

            const usuarios = JSON.parse(localStorage.getItem('usuariosEscola')) || {};
            const user = usuarios[email];

            if (user && user.senha === senha) {
                usuarioLogado = user;
                document.getElementById('aluno-email-header').textContent = user.email;
                mostrarTela('role-screen');
            } else {
                alert('E-mail ou senha incorretos!');
            }
        }

        function escolherRole(role) {
            if (role === 'aluno') {
                mostrarTela('aluno-dashboard');
            } else {
                alert('Dashboard do Responsável em breve...');
            }
        }

        function voltarParaRole() {
            mostrarTela('role-screen');
        }
    </script>
</body>
</html>
