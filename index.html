<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colégio São Cristóvão</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOPO -->
<div class="topo">
  <h1>Colégio Estadual São Cristóvão</h1>
  <h3>Fundado em 1978</h3>
  <p>Educar é o nosso compromisso; inspirar é a nossa paixão.</p>
</div>

<!-- TELA INICIAL -->
<div class="container" id="inicio">

  <div class="logo">e.</div>
  <h2 class="titulo">escola <span>PARANÁ</span></h2>

  <button class="btn" onclick="irPara('tipo')">Fazer Login</button>
  <button class="btn-outline" onclick="irPara('tipo')">Registrar</button>

</div>

<!-- ESCOLHA -->
<div class="container hidden" id="tipo">

  <h2>Como deseja acessar?</h2>

  <div class="card" onclick="abrirLogin('Aluno')">
    👨‍🎓
    <p>Sou aluno</p>
  </div>

  <div class="card" onclick="abrirLogin('Responsável')">
    👨‍👩‍👧
    <p>Sou responsável</p>
  </div>

  <button class="voltar" onclick="voltar('inicio')">⬅ Voltar</button>

</div>

<!-- LOGIN -->
<div class="container hidden" id="login">

  <h2 id="tituloLogin">Login</h2>

  <input id="cpf" type="text" placeholder="CGM ou CPF" oninput="validar()">
  <input id="celular" type="text" placeholder="Celular" oninput="validar()">

  <button id="entrar" class="btn" onclick="entrar()" disabled>
    Entrar
  </button>

  <button class="voltar" onclick="voltar('tipo')">⬅ Voltar</button>

</div>

<!-- MENU -->
<div class="container hidden" id="menu">

  <h2>Menu</h2>

  <div class="grid">
    <div class="item">🏠<span>Início</span></div>
    <div class="item">📊<span>Grade</span></div>
    <div class="item">📝<span>Notas</span></div>
    <div class="item">📅<span>Frequência</span></div>
    <div class="item">📆<span>Agenda</span></div>
    <div class="item">🔔<span>Avisos</span></div>
  </div>

  <button class="sair" onclick="sair()">Sair</button>

</div>

<script src="script.js"></script>
</body>
</html>
