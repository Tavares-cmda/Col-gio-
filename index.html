<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escola Paraná</title>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
       
        :root {
            --primary: #003087;
            --secondary: #C8102E;
        }
       
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #003087, #0055cc);
            color: white;
            min-height: 100vh;
        }
       
        #splash {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #003087, #0055cc);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 1s ease;
        }
        #splash-logo {
            width: 240px;
            height: 240px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            font-size: 100px;
            color: #003087;
        }
        #splash-text { font-size: 28px; font-weight: 700; }

        .screen { display: none; min-height: 100vh; padding: 20px; }
        .screen.active { display: block; }

        .form-container {
            max-width: 420px;
            margin: 80px auto 0;
            background: white;
            color: #333;
            padding: 35px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
            text-align: center;
        }
        h2 { color: var(--primary); margin-bottom: 25px; }

        .input-group {
            position: relative;
            margin: 12px 0;
        }
       
        input {
            width: 100%;
            padding: 15px 58px 15px 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }
       
        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f1f3f5;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 24px;
            cursor: pointer;
            color: #555;
        }
       
        button {
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
        }
       
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #666; color: white; }
        .btn-back {
            background: #C8102E;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- SPLASH -->
    <div id="splash">
        <div id="splash-logo">🏫</div>
        <div id="splash-text">Escola Paraná</div>
    </div>

    <!-- TELAS (mesmas de antes) -->
    <div id="initial-screen" class="screen active">
        <div class="form-container">
            <h2>Bem-vindo ao App Escola Paraná</h2>
            <p style="margin: 25px 0 35px; color:#555;">Escolha uma opção para continuar</p>
           
            <button onclick="mostrarLogin()" class="btn-primary">Fazer Login</button>
            <button onclick="mostrarRegistro()" class="btn-secondary">Criar Nova Conta</button>
           
            <p style="margin-top: 40px; font-size: 14px; color:#666;">Use apenas @escola.pr.gov.br</p>
        </div>
    </div>

    <!-- Registro -->
    <div id="register-screen" class="screen">
        <div class="form-container">
            <h2>Criar Conta</h2>
            <input type="email" id="reg-email" placeholder="seuemail@escola.pr.gov.br">
           
            <div class="input-group">
                <input type="password" id="reg-senha" placeholder="Crie uma senha">
                <button type="button" class="toggle-password" onclick="togglePassword('reg-senha')">👁</button>
            </div>
           
            <div class="input-group">
                <input type="password" id="reg-conf-senha" placeholder="Confirme a senha">
                <button type="button" class="toggle-password" onclick="togglePassword('reg-conf-senha')">👁</button>
            </div>
           
            <button onclick="registrarUsuario()" class="btn-primary">Registrar</button>
            <p onclick="voltarInicial()" style="margin-top:15px; color:var(--primary); cursor:pointer;">Voltar</p>
        </div>
    </div>

    <!-- Login -->
    <div id="login-screen" class="screen">
        <div class="form-container">
            <h2>Fazer Login</h2>
            <input type="email" id="login-email" placeholder="seuemail@escola.pr.gov.br">
           
            <div class="input-group">
                <input type="password" id="login-senha" placeholder="Senha">
                <button type="button" class="toggle-password" onclick="togglePassword('login-senha')">👁</button>
            </div>
           
            <button onclick="fazerLogin()" class="btn-primary">Entrar</button>
            <p onclick="voltarInicial()" style="margin-top:15px; color:var(--primary); cursor:pointer;">Voltar</p>
        </div>
    </div>

    <!-- Role Screen e Dashboard permanecem iguais -->

    <script>
        // ==================== CONFIGURAÇÃO FIREBASE ====================
        const firebaseConfig = {
            apiKey: "SUA_API_KEY_AQUI",
            authDomain: "escola-parana.firebaseapp.com",
            projectId: "escola-parana",
            storageBucket: "escola-parana.firebasestorage.app",
            messagingSenderId: "SEU_SENDER_ID",
            appId: "SEU_APP_ID"
        };

        // Inicializa Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let usuarioLogado = null;

        function mostrarTela(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        window.onload = function() {
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                    mostrarTela('initial-screen');
                }, 1000);
            }, 3000);
        };

        function togglePassword(id) {
            const input = document.getElementById(id);
            input.type = (input.type === 'password') ? 'text' : 'password';
        }

        // ====================== REGISTRO ======================
        async function registrarUsuario() {
            const email = document.getElementById('reg-email').value.trim();
            const senha = document.getElementById('reg-senha').value;
            const confSenha = document.getElementById('reg-conf-senha').value;

            if (!email.endsWith('@escola.pr.gov.br')) {
                return alert('O e-mail deve terminar com @escola.pr.gov.br');
            }
            if (senha.length < 6) {
                return alert('A senha deve ter no mínimo 6 caracteres');
            }
            if (senha !== confSenha) {
                return alert('As senhas não coincidem');
            }

            try {
                // Cria usuário no Authentication
                const userCredential = await auth.createUserWithEmailAndPassword(email, senha);
                
                // Salva dados adicionais no Firestore (banco de dados)
                await db.collection('usuarios').doc(userCredential.user.uid).set({
                    email: email,
                    nome: email.split('@')[0],
                    role: null, // será definido depois
                    criadoEm: firebase.firestore.FieldValue.serverTimestamp()
                });

                alert('✅ Conta criada com sucesso!');
                document.getElementById('login-email').value = email;
                mostrarTela('login-screen');

            } catch (error) {
                if (error.code === 'auth/email-already-in-use') {
                    alert('❌ Esta conta já existe! Faça login.');
                } else {
                    alert('Erro ao criar conta: ' + error.message);
                }
            }
        }

        // ====================== LOGIN ======================
        async function fazerLogin() {
            const email = document.getElementById('login-email').value.trim();
            const senha = document.getElementById('login-senha').value;

            if (!email.endsWith('@escola.pr.gov.br')) {
                return alert('Use um e-mail @escola.pr.gov.br');
            }

            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, senha);
                usuarioLogado = userCredential.user;

                // Busca dados do usuário no Firestore
                const userDoc = await db.collection('usuarios').doc(usuarioLogado.uid).get();
                
                document.getElementById('aluno-email-header').textContent = usuarioLogado.email;
                mostrarTela('role-screen');

            } catch (error) {
                alert('E-mail ou senha incorretos!');
            }
        }

        // Funções de navegação (mantidas)
        function mostrarRegistro() { mostrarTela('register-screen'); }
        function mostrarLogin() { mostrarTela('login-screen'); }
        function voltarInicial() { mostrarTela('initial-screen'); }
        function voltarParaRole() { mostrarTela('role-screen'); }

        function escolherRole(role) {
            if (role === 'aluno') {
                mostrarTela('aluno-dashboard');
            } else {
                alert('Dashboard do Responsável em breve...');
            }
        }
    </script>
</body>
</html>
